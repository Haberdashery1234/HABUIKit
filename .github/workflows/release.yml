name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Build & publish xcframework ─────────────────────────────────────────────
  build-xcframework:
    name: Build xcframework
    runs-on: macos-15
    permissions:
      contents: write # required to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build xcframework
        run: ./Scripts/build-xcframework.sh

      - name: Zip xcframework
        run: |
          cd build
          zip -r HABUIKit.xcframework.zip HABUIKit.xcframework

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum build/HABUIKit.xcframework.zip)
          echo "value=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/HABUIKit.xcframework.zip
          generate_release_notes: true
          body: |
            ## Installation

            ### Swift Package Manager — binary (recommended for faster builds)

            Add to your `Package.swift`:
            ```swift
            .binaryTarget(
                name: "HABUIKit",
                url: "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/HABUIKit.xcframework.zip",
                checksum: "${{ steps.checksum.outputs.value }}"
            )
            ```

            ### Swift Package Manager — source

            ```swift
            .package(
                url: "https://github.com/${{ github.repository }}",
                from: "${{ github.ref_name }}"
            )
            ```

            **xcframework checksum:** `${{ steps.checksum.outputs.value }}`
